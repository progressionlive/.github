name: Auto Review PR
on:
  pull_request:
    types: [opened, ready_for_review]
jobs:
  review:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
    uses: progressionlive/actions/.github/workflows/auto-review-pr.yml@master
    secrets:
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      COPILOT_CLI_BOT: ${{ secrets.COPILOT_CLI_BOT }}
